name: DevSecOps Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Secret Scanning ──────────────────────────────────────
  secret-scan:
    name: GitLeaks — Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. SAST + Lint ───────────────────────────────────────────
  sast:
    name: ESLint Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - name: Run ESLint Security
        run: |
          npx eslint src/ \
            --plugin security \
            --rule "security/detect-non-literal-fs-filename: warn"

  # ── 3. Dependency Audit ──────────────────────────────────────
  dependency-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm audit --audit-level=high

  # ── 4. Tests ─────────────────────────────────────────────────
  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm test

  # ── 5. Docker Build + Trivy Image Scan ───────────────────────
  docker-scan:
    name: Build + Trivy Image Scan
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, dependency-audit, test]
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t todo-api:${{ github.sha }} .
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: todo-api:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
